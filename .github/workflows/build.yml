name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build Web App
      run: npm run build
    
    - name: Sync Capacitor
      run: npx cap sync android
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Create Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        VERSION=$(node -e "console.log(require('./www/js/tools-data.js').match(/version:\s*['\"]([^'\"]+)/)[1])")
        TAG="v${VERSION}"
        echo "Creating release ${TAG}"
        
        # Create or update release
        gh release create "${TAG}" android/app/build/outputs/apk/debug/app-debug.apk \
          --title "${TAG}" \
          --notes "一一工具箱 ${TAG}" \
          --prerelease=false \
          2>/dev/null || \
        gh release upload "${TAG}" android/app/build/outputs/apk/debug/app-debug.apk \
          --clobber
